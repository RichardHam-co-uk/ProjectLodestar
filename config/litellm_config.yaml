
model_list:
  # ============================================
  # TIER 1: FREE LOCAL MODELS (Default)
  # Use openai/ prefix + Ollama /v1 endpoint to avoid litellm ollama-provider hang
  # ============================================
  - model_name: gpt-3.5-turbo
    litellm_params:
      # qwen2.5-coder:1.5b (~1 GiB) — fits within T600 available memory
      # replaces deepseek-coder:6.7b (2.5 GiB) which exceeded T600 memory limit
      model: openai/qwen2.5-coder:1.5b
      api_base: http://192.168.120.211:11434/v1
      api_key: ollama

  - model_name: local-llama
    litellm_params:
      model: openai/llama3.2:1b
      api_base: http://192.168.120.211:11434/v1
      api_key: ollama

  - model_name: local-reasoning
    litellm_params:
      model: openai/deepseek-r1:7b
      api_base: http://192.168.120.211:11434/v1
      api_key: ollama

# ============================================
  # TIER 2: CLAUDE (Anthropic API)
  # ============================================
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-5-20250929
      api_key: os.environ/ANTHROPIC_API_KEY
      
  - model_name: claude-opus
    litellm_params:
      model: anthropic/claude-opus-4-5-20251101
      api_key: os.environ/ANTHROPIC_API_KEY

# ============================================
  # TIER 3: OPENAI (ChatGPT API)
  # ============================================
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
      
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # ============================================
  # TIER 4: GROK (xAI API — credits required)
  # grok-3-fast: best speed/quality (~0.9s, confirmed 2026-03-08)
  # grok-3-mini: cheapest xAI option, good for lighter tasks
  # ============================================
  - model_name: grok-beta
    litellm_params:
      model: xai/grok-3-fast
      api_key: os.environ/XAI_API_KEY

  - model_name: grok-3-mini
    litellm_params:
      model: xai/grok-3-mini
      api_key: os.environ/XAI_API_KEY

  # ============================================
  # TIER 4: PERPLEXITY (Perplexity AI)
  # api.perplexity.ai:443 allowlisted 2026-03-08
  # ============================================
  - model_name: perplexity-sonar
    litellm_params:
      model: perplexity/sonar
      api_key: os.environ/PERPLEXITY_API_KEY

  - model_name: perplexity-sonar-pro
    litellm_params:
      model: perplexity/sonar-pro
      api_key: os.environ/PERPLEXITY_API_KEY

# ============================================
  # TIER 5: GEMINI (Google AI Studio)
  # ============================================
  - model_name: gemini-pro
    litellm_params:
      model: gemini-1.5-flash
      api_key: os.environ/GEMINI_API_KEY

router_settings:
  routing_strategy: least-busy
  num_retries: 3
  timeout: 600
  set_verbose: true
