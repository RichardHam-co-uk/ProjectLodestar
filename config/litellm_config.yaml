
model_list:
  # ============================================
  # LOCAL SPECIALISTS — vm-gpu-media T600 GPU (4 GiB VRAM)
  # Ollama at 192.168.120.211:11434 — one model in VRAM at a time (hot-swap)
  # Use openai/ prefix + /v1 endpoint to avoid litellm ollama-provider async hang
  #
  # Palette (confirmed pulled 2026-03-08):
  #   local-code      qwen2.5-coder:3b  1.93 GiB  code gen, bug fixes, docs
  #   local-instruct  llama3.2:3b       2.02 GiB  general tasks, tool use, structured output
  #   local-reasoning deepseek-r1:1.5b  1.12 GiB  quick chain-of-thought, step-by-step
  #   local-analysis  phi4-mini         2.49 GiB  complex refactor, debug analysis, function calling
  # ============================================

  - model_name: local-code
    litellm_params:
      # Best-in-class coding model for T600 VRAM budget
      # Purpose: code_generation, bug_fix, documentation tasks
      model: openai/qwen2.5-coder:3b
      api_base: http://192.168.120.211:11434/v1
      api_key: ollama

  - model_name: local-instruct
    litellm_params:
      # Strong instruction-following and tool use; replaces llama3.2:1b (local-llama)
      # Purpose: general tasks, structured output, prompt rewriting
      model: openai/llama3.2:3b
      api_base: http://192.168.120.211:11434/v1
      api_key: ollama

  - model_name: local-reasoning
    litellm_params:
      # Fast chain-of-thought reasoning with visible <think> traces
      # Purpose: step-by-step analysis where reasoning transparency matters
      model: openai/deepseek-r1:1.5b
      api_base: http://192.168.120.211:11434/v1
      api_key: ollama

  - model_name: local-analysis
    litellm_params:
      # Microsoft Phi-4 Mini — 3.8B, 128K context, native function calling (2.49 GiB)
      # Purpose: complex refactor, deep debug analysis, multi-step code review
      model: openai/phi4-mini:latest
      api_base: http://192.168.120.211:11434/v1
      api_key: ollama

  # Legacy aliases — kept for backwards compatibility with existing callers
  - model_name: gpt-3.5-turbo
    litellm_params:
      model: openai/qwen2.5-coder:3b
      api_base: http://192.168.120.211:11434/v1
      api_key: ollama

  - model_name: local-llama
    litellm_params:
      model: openai/llama3.2:3b
      api_base: http://192.168.120.211:11434/v1
      api_key: ollama

  # ============================================
  # CLOUD: CLAUDE (Anthropic API)
  # ============================================
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-5-20250929
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-opus
    litellm_params:
      model: anthropic/claude-opus-4-5-20251101
      api_key: os.environ/ANTHROPIC_API_KEY

  # ============================================
  # CLOUD: OPENAI
  # ============================================
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # ============================================
  # CLOUD: GROK (xAI)
  # grok-3-fast: best speed/quality (~0.9s, confirmed 2026-03-08)
  # ============================================
  - model_name: grok-beta
    litellm_params:
      model: xai/grok-3-fast
      api_key: os.environ/XAI_API_KEY

  - model_name: grok-3-mini
    litellm_params:
      model: xai/grok-3-mini
      api_key: os.environ/XAI_API_KEY

  # ============================================
  # CLOUD: PERPLEXITY
  # ============================================
  - model_name: perplexity-sonar
    litellm_params:
      model: perplexity/sonar
      api_key: os.environ/PERPLEXITY_API_KEY

  - model_name: perplexity-sonar-pro
    litellm_params:
      model: perplexity/sonar-pro
      api_key: os.environ/PERPLEXITY_API_KEY

  # ============================================
  # CLOUD: GEMINI
  # ============================================
  - model_name: gemini-pro
    litellm_params:
      model: gemini-1.5-flash
      api_key: os.environ/GEMINI_API_KEY

router_settings:
  routing_strategy: least-busy
  num_retries: 3
  timeout: 600
  set_verbose: true
